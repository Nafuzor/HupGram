<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HupPanel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --bg: #050505; --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.08); --text-p: #fff; --text-s: #86868b; --acc: #fff; --danger: #ff453a; --success: #32d74b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-p); padding-bottom: 90px; }
        
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); background: rgba(5,5,5,0.8); position: sticky; top: 0; z-index: 100; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info h2 { font-size: 18px; }
        .user-info p { font-size: 13px; }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 15px; text-align: center; }
        .stat-box h3 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .stat-box p { font-size: 12px; color: var(--text-s); }

        .module-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .module-item:last-child { border-bottom: none; }
        .module-info { display: flex; align-items: center; gap: 15px; }
        .module-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--acc); }
        .module-text h4 { font-size: 16px; margin-bottom: 3px; }
        .module-text p { font-size: 12px; color: var(--text-s); }

        .toggle-switch { position: relative; width: 50px; height: 28px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 20px; outline: none; transition: 0.3s; cursor: pointer; border: 1px solid var(--border); }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .toggle-switch:checked { background: var(--acc); }
        .toggle-switch:checked::after { transform: translateX(22px); background: #000; }

        .btn-danger { width: 100%; padding: 16px; border-radius: 14px; background: rgba(255,69,58,0.1); color: var(--danger); border: 1px solid rgba(255,69,58,0.3); font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; }
        .btn-save { width: 100%; padding: 16px; border-radius: 14px; background: #fff; color: #000; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; margin-top: 20px; border: none; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,5,5,0.9); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 10px 25px 10px; }
        .nav-item { color: var(--text-s); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; cursor: pointer; }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--acc); }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar" id="user-avatar"><i class="ri-user-smile-line"></i></div>
        <div class="user-info">
            <h2 id="user-name">Загрузка...</h2>
            <p id="core-status">Синхронизация...</p>
        </div>
    </div>

    <!-- ДАШБОРД -->
    <div id="tab-dashboard" class="tab-content active">
        <div class="stat-grid">
            <div class="stat-box">
                <h3 id="sub-days">0</h3>
                <p>Дней подписки</p>
            </div>
            <div class="stat-box">
                <h3>Активно</h3>
                <p>База данных</p>
            </div>
        </div>

        <button class="btn-danger" onclick="triggerKillSwitch()">
            <i class="ri-skull-2-line"></i> Уничтожить сессию
        </button>
    </div>

    <!-- МОДУЛИ -->
    <div id="tab-store" class="tab-content">
        <h2 style="margin-bottom: 15px;">Управление ядром</h2>
        <div class="card" style="padding: 10px 20px;">
            <div class="module-item">
                <div class="module-info">
                    <div class="module-icon"><i class="ri-eye-off-line"></i></div>
                    <div class="module-text"><h4>Анти-Удаление</h4><p>Логгер сообщений</p></div>
                </div>
                <input type="checkbox" class="toggle-switch" id="mod_logger">
            </div>
            <div class="module-item">
                <div class="module-info">
                    <div class="module-icon"><i class="ri-robot-line"></i></div>
                    <div class="module-text"><h4>Автоответчик</h4><p>Триггеры и правила</p></div>
                </div>
                <input type="checkbox" class="toggle-switch" id="mod_reply">
            </div>
            <div class="module-item">
                <div class="module-info">
                    <div class="module-icon"><i class="ri-lock-password-line"></i></div>
                    <div class="module-text"><h4>Шифратор</h4><p>Секретные чаты</p></div>
                </div>
                <input type="checkbox" class="toggle-switch" id="mod_crypt">
            </div>
        </div>
        <button class="btn-save" id="save-btn">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="ri-dashboard-line"></i><span>Дашборд</span></div>
        <div class="nav-item" onclick="switchTab('store', this)"><i class="ri-apps-2-line"></i><span>Модули</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПАРСИМ РЕАЛЬНЫЕ ДАННЫЕ ИЗ ССЫЛКИ
        const urlParams = new URLSearchParams(window.location.search);
        const logStatus = urlParams.get('log') === '1';
        const repStatus = urlParams.get('rep') === '1';
        const crStatus = urlParams.get('cr') === '1';
        const daysLeft = urlParams.get('days') || '0';
        const isOnline = urlParams.get('st') === '1';
        const botUsername = urlParams.get('bot');

        // 2. ВСТАВЛЯЕМ ДАННЫЕ В ИНТЕРФЕЙС
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            if (user.photo_url) document.getElementById('user-avatar').innerHTML = `<img src="${user.photo_url}">`;
        }

        document.getElementById('sub-days').innerText = daysLeft;
        
        const statusEl = document.getElementById('core-status');
        if (isOnline) {
            statusEl.innerHTML = '<b style="color:var(--success)">Ядро: Online</b>';
        } else {
            statusEl.innerHTML = '<b style="color:var(--danger)">Ядро: Offline</b>';
        }

        document.getElementById('mod_logger').checked = logStatus;
        document.getElementById('mod_reply').checked = repStatus;
        document.getElementById('mod_crypt').checked = crStatus;

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            element.classList.add('active');
        }

        // 3. ОТПРАВКА ДАННЫХ ОБРАТНО БОТУ ЧЕРЕЗ ССЫЛКУ START
        document.getElementById('save-btn').addEventListener('click', () => {
            const logV = document.getElementById('mod_logger').checked ? 1 : 0;
            const repV = document.getElementById('mod_reply').checked ? 1 : 0;
            const crV = document.getElementById('mod_crypt').checked ? 1 : 0;
            
            // Заставляем телеграм перекинуть нас в бота и отправить ему команду /start save_1_0_1
            tg.openTelegramLink(`https://t.me/${botUsername}?start=save_${logV}_${repV}_${crV}`);
            tg.close();
        });

        function triggerKillSwitch() {
            tg.showConfirm("УНИЧТОЖИТЬ СЕССИЮ?", function(passed) {
                if (passed) {
                    tg.openTelegramLink(`https://t.me/${botUsername}?start=kill_session`);
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
